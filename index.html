<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lakshmi Vacuum Technologies | Enquiry Form</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#0b2c5f,#0b5ed7);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:760px;
background:#ffffff;
border-radius:16px;
overflow:hidden;
box-shadow:0 18px 45px rgba(0,0,0,0.18);
}

.header{
background:#0b2c5f;
padding:30px;
text-align:center;
color:#ffffff;
}

.header img{
max-width:230px;
height:auto;
display:block;
margin:0 auto 18px auto;
}

.header h1{
font-size:30px;
margin-bottom:8px;
font-weight:700;
}

.header p{
font-size:16px;
opacity:0.95;
}

.form-box{
padding:36px;
}

.form-box h2{
text-align:center;
font-size:28px;
color:#0b2c5f;
margin-bottom:10px;
}

.form-box p{
text-align:center;
font-size:14px;
color:#666;
margin-bottom:28px;
}

.input-group{
margin-bottom:18px;
}

input,select,textarea{
width:100%;
padding:14px;
border:1px solid #d9d9d9;
border-radius:8px;
font-size:15px;
outline:none;
transition:0.3s;
}

input:focus,select:focus,textarea:focus{
border-color:#0b5ed7;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
width:100%;
background:#0b5ed7;
color:#ffffff;
border:none;
padding:16px;
font-size:17px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0848a8;
}

.footer{
background:#f5f7fa;
padding:18px;
text-align:center;
font-size:14px;
}

.footer a{
text-decoration:none;
color:#0b5ed7;
font-weight:bold;
}

.footer a:hover{
text-decoration:underline;
}

@media(max-width:600px){

.header h1{
font-size:24px;
}

.form-box{
padding:22px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png" alt="Lakshmi Vacuum Technologies Logo">
<h1>Vacuum Heat Treatment Furnace</h1>
<p>Vacuum Heat Treatment Furnace • Vacuum Heat Treatment Services</p>
</div>

<div class="form-box">

<h2>Submit Your Enquiry</h2>
<p>Please share your requirement. Our team will contact you shortly.</p>

<form id="enquiryForm">

<div class="input-group">
<input type="text" name="company" placeholder="Company Name" required>
</div>

<div class="input-group">
<input type="text" name="person" placeholder="Contact Person" required>
</div>

<div class="input-group">
<input type="tel" name="mobile" placeholder="Mobile Number" required>
</div>

<div class="input-group">
<input type="email" name="email" placeholder="Email Address" required>
</div>

<div class="input-group">
<select name="product" required>

<option value="">Select Requirement</option>

<option>Vacuum Heat Treatment Furnace</option>

<option>Vacuum Heat Treatment Services</option>

<option disabled>──────── Application ────────</option>
<option>Vacuum Brazing</option>
<option>Vacuum Annealing</option>
<option>Vacuum Tempering</option>
<option>Vacuum Stress Relieving</option>
<option>Vacuum Quench Hardening</option>

<option>Other</option>

</select>
</div>

<div class="input-group">
<textarea name="remark" placeholder="Remark / Requirement"></textarea>
</div>

<button type="submit">Submit Enquiry</button>

</form>

</div>

<div class="footer">
<a href="https://www.lakshmivacuum.com" target="_blank">
www.lakshmivacuum.com
</a>
</div>

</div>

</body>
</html>
